version: "3.9"

services:
  app:
    build: .
    container_name: radarsolar
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - FORCE_HTTPS=true
      - ALLOWED_ORIGINS=https://radarsolar.app
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
